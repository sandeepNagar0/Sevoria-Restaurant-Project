<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table{
            width: 80%;
            border: 1px solid black;
            border-collapse: collapse;
            text-align: center;
            margin: 20px auto;
        }
        th{
            padding: 10px;
            
        }
        td{
            padding: 10px;
            font-weight: bold;
        }

        button{
            padding: 5px 15px;
            border: none;
            background: red;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <table border="1">
        <thead>
            <tr>
                <th>No.</th>
                <th>Name</th>
                <th>Email Id</th>
                <th>Phone Number</th>
                <th>Seats</th>
                <th>Date</th>
                <th>Time</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="table">

        </tbody>
    </table>
    
</body>

<script src="form-data.js"></script>

</html>
